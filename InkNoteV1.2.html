<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkNote</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jura:wght@400;500;600&family=EB+Garamond:wght@400;500;600&display=swap');

    :root {
      --bg: #e7dcc7;
      --panel: #f3ebdc;
      --panel-2: #efe2cb;
      --paper: #faf4e9;
      --ink: #1e1a17;
      --muted: #5f564d;
      --line: #1e1a17;
      --shadow: 6px 6px 0 rgba(30,26,23,0.15);
      --rail-width: 56px;
      --drawer-width: 320px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      color: var(--ink);
      font-family: 'EB Garamond', serif;
      background:
        linear-gradient(rgba(231,220,199,0.92), rgba(231,220,199,0.92)),
        linear-gradient(#ddd0b6 1px, transparent 1px),
        linear-gradient(90deg, #ddd0b6 1px, transparent 1px);
      background-size: auto, 20px 20px, 20px 20px;
      overflow: hidden;
    }

    .app {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(30, 26, 23, 0.34);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 18;
    }

    .scrim.show {
      opacity: 1;
      pointer-events: auto;
    }

    .rail {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--rail-width);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border-right: 2px solid var(--line);
      z-index: 25;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 6px;
      gap: 6px;
      box-shadow: var(--shadow);
    }

    .rail button {
      appearance: none;
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.8);
      color: var(--ink);
      cursor: pointer;
      font-family: 'Jura', sans-serif;
      font-size: 0.9rem;
      line-height: 1;
      display: grid;
      place-items: center;
      transition: all 0.12s ease;
    }

    .rail button:hover { transform: translate(-1px, -1px); background: #fff; }

    .rail .brand {
      margin-top: 2px;
      font-family: 'Jura', sans-serif;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: var(--muted);
      user-select: none;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: var(--rail-width);
      width: var(--drawer-width);
      height: 100vh;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border-right: 2px solid var(--line);
      transform: translateX(-100%);
      transition: transform 0.26s ease;
      z-index: 22;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 12px;
      border-bottom: 2px solid var(--line);
      background: rgba(255,255,255,0.18);
      flex-shrink: 0;
    }

    .drawer-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 10px 0;
      font-family: 'Jura', sans-serif;
      font-size: 1.15rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .note-count {
      font-size: 0.65rem;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 3px 6px;
      white-space: nowrap;
      background: rgba(255,255,255,0.45);
    }

    .drawer-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
      cursor: pointer;
      font-family: 'Jura', sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      line-height: 1;
      transition: all 0.12s ease;
    }

    .btn:hover { transform: translate(-1px, -1px); background: #f7f1e7; }
    .btn:active { transform: translate(0, 0); }
    .btn.secondary { background: rgba(255,255,255,0.5); }
    .btn.small { padding: 6px 8px; font-size: 0.65rem; }

    .search {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      outline: none;
      background: rgba(255,255,255,0.6);
      color: var(--ink);
      font-family: 'Jura', sans-serif;
      font-size: 0.75rem;
    }

    .search:focus {
      background: #fff;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .notes-list::-webkit-scrollbar,
    #content::-webkit-scrollbar,
    .footnotes-display::-webkit-scrollbar,
    .metadata-panel::-webkit-scrollbar,
    .autocomplete-dropdown::-webkit-scrollbar {
      width: 6px;
    }

    .notes-list::-webkit-scrollbar-track,
    #content::-webkit-scrollbar-track,
    .footnotes-display::-webkit-scrollbar-track,
    .metadata-panel::-webkit-scrollbar-track,
    .autocomplete-dropdown::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
    }

    .notes-list::-webkit-scrollbar-thumb,
    #content::-webkit-scrollbar-thumb,
    .footnotes-display::-webkit-scrollbar-thumb,
    .metadata-panel::-webkit-scrollbar-thumb,
    .autocomplete-dropdown::-webkit-scrollbar-thumb {
      background: rgba(30,26,23,0.2);
      border-radius: 3px;
    }

    .note-item {
      position: relative;
      margin-bottom: 6px;
      padding: 9px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.12s ease;
      overflow: hidden;
    }

    .note-item:hover {
      transform: translate(-1px, -1px);
      background: #fff;
    }

    .note-item.active {
      background: #fff;
      outline: 1px solid var(--line);
      outline-offset: -2px;
    }

    .note-item-title {
      margin: 0 22px 2px 0;
      font-family: 'Jura', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      word-break: break-word;
      line-height: 1.2;
    }

    .note-item-preview {
      margin: 0;
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.25;
      word-break: break-word;
      font-family: 'Jura', sans-serif;
    }

    .note-item-btn {
      position: absolute;
      top: 6px;
      width: 22px;
      height: 22px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 0.8rem;
      padding: 0;
      transition: all 0.12s ease;
    }

    .note-item-btn:hover {
      background: #f7f1e7;
      transform: translate(-1px, -1px);
    }

    .pin-btn { right: 30px; }
    .delete-btn { right: 6px; }

    .main {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, var(--paper) 0%, #f5ecde 100%);
      border-left: 2px solid var(--line);
      margin-left: var(--rail-width);
    }

    .editor-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-bottom: 2px solid var(--line);
      background: rgba(255,255,255,0.22);
      flex-shrink: 0;
    }

    .title-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--line);
      outline: none;
      background: rgba(255,255,255,0.6);
      color: var(--ink);
      font-family: 'Jura', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 10px;
    }

    .header-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toolbar {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .toolbar-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.5);
      color: var(--ink);
      padding: 5px 8px;
      cursor: pointer;
      font-family: 'Jura', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.12s ease;
    }

    .toolbar-btn:hover { background: #fff; transform: translate(-1px, -1px); }
    .toolbar-btn:active { transform: translate(0, 0); }

    .editor-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #content {
      flex: 1;
      width: 100%;
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      padding: 16px 14px;
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--ink);
      overflow-y: auto;
    }

    #content::placeholder { color: rgba(30,26,23,0.35); }

    .footnotes-section,
    .metadata-panel {
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .footnotes-section {
      max-height: 180px;
      overflow: hidden;
    }

    .metadata-panel {
      max-height: 170px;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      z-index: 50;
    }

    .section-label {
      font-family: 'Jura', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
      font-weight: 600;
    }

    .footnote-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .footnote-input {
      flex: 1;
      min-width: 0;
      border: 1px dashed var(--line);
      background: rgba(255,255,255,0.4);
      padding: 6px 8px;
      font-family: 'Jura', sans-serif;
      font-size: 0.75rem;
      color: var(--ink);
      outline: none;
    }

    .footnote-input:focus {
      background: rgba(255,255,255,0.7);
    }

    .footnotes-display {
      max-height: 108px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .footnote-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(30,26,23,0.08);
      font-family: 'Jura', sans-serif;
      font-size: 0.7rem;
    }

    .footnote-link {
      color: var(--ink);
      text-decoration: underline;
      word-break: break-word;
      line-height: 1.2;
    }

    .footnote-link:hover {
      color: var(--muted);
    }

    .footnote-meta {
      color: var(--muted);
      font-size: 0.62rem;
      word-break: break-word;
      margin-left: 8px;
      opacity: 0.9;
    }

    .footnote-remove {
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.8);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 0.75rem;
      line-height: 1;
    }

    .footnote-remove:hover {
      background: #fff;
    }

    .tags-display {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
      min-height: 20px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(30,26,23,0.08);
      border: 1px solid var(--line);
      padding: 3px 6px;
      font-family: 'Jura', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .tag-label {
      font-weight: 500;
    }

    .tag-qid {
      font-size: 0.6rem;
      color: var(--muted);
      opacity: 0.7;
    }

    .tag-remove {
      cursor: pointer;
      color: var(--muted);
      font-weight: bold;
      transition: color 0.1s;
      margin-left: 2px;
    }

    .tag-remove:hover {
      color: var(--ink);
    }

    .tag-input-wrapper {
      position: relative;
      display: flex;
      flex-direction: column-reverse;
    }

    .tag-input-field {
      width: 100%;
      border: 1px dashed var(--line);
      padding: 4px 6px;
      background: rgba(255,255,255,0.4);
      font-family: 'Jura', sans-serif;
      font-size: 0.7rem;
      outline: none;
    }

    .tag-input-field:focus {
      background: rgba(255,255,255,0.7);
    }

    .autocomplete-dropdown {
      position: fixed;
      background: #fff;
      border: 2px solid var(--line);
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: var(--shadow);
      min-width: 200px;
    }

    .autocomplete-dropdown.show {
      display: block;
    }

    .autocomplete-item {
      padding: 6px 8px;
      border-bottom: 1px solid rgba(30,26,23,0.1);
      cursor: pointer;
      font-size: 0.7rem;
      font-family: 'Jura', sans-serif;
    }

    .autocomplete-item:hover {
      background: rgba(30,26,23,0.05);
    }

    .autocomplete-label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      display: block;
    }

    .autocomplete-desc {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .autocomplete-qid {
      font-size: 0.6rem;
      color: var(--muted);
      opacity: 0.6;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-top: 2px solid var(--line);
      background: rgba(255,255,255,0.18);
      font-family: 'Jura', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      flex-shrink: 0;
    }

    .status {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 920px) {
      .drawer {
        width: min(88vw, 320px);
      }
    }

    @media (max-width: 680px) {
      :root {
        --rail-width: 50px;
      }

      .main {
        margin-left: var(--rail-width);
      }

      .rail button {
        width: 36px;
        height: 36px;
        font-size: 0.8rem;
      }

      .header-actions {
        gap: 4px;
      }

      .btn {
        padding: 7px 8px;
      }

      .title-input {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="scrim" id="scrim"></div>

    <aside class="rail" aria-label="App rail">
      <button id="drawerToggle" type="button" aria-label="Toggle notes">☰</button>
      <button id="newNoteBtn" type="button" aria-label="New note">＋</button>
      <button id="exportJsonBtn" type="button" aria-label="Export notes">⤓</button>
      <div class="brand">InkNote</div>
    </aside>

    <aside class="drawer" id="drawer" aria-label="Notes drawer">
      <div class="drawer-header">
        <div class="drawer-title">
          InkNote
          <span class="note-count" id="noteCount">0</span>
        </div>
        <div class="drawer-controls">
          <button class="btn" id="newNoteBtnTop" type="button">+ Note</button>
          <button class="btn secondary" id="exportJsonBtnTop" type="button">⬇ JSON</button>
        </div>
        <input class="search" id="search" type="text" placeholder="Search..." autocomplete="off" />
      </div>
      <div class="notes-list" id="notesList"></div>
    </aside>

    <main class="main">
      <div class="editor-header">
        <input id="title" class="title-input" type="text" placeholder="Untitled" />
        <div class="header-actions">
          <button class="btn secondary" id="pinBtn" type="button">Pin</button>
          <button class="btn secondary" id="deleteBtn" type="button">Delete</button>
        </div>
      </div>

      <div class="toolbar">
        <button class="toolbar-btn" id="headingBtn" title="Heading">H1</button>
        <button class="toolbar-btn" id="subheadingBtn" title="Subheading">H2</button>
        <button class="toolbar-btn" id="boldBtn" title="Bold">B</button>
        <button class="toolbar-btn" id="italicBtn" title="Italic">I</button>
        <button class="toolbar-btn" id="codeBtn" title="Code">Code</button>
        <button class="toolbar-btn" id="linkBtn" title="Insert link markdown">Link</button>
      </div>

      <div class="editor-body">
        <textarea id="content" placeholder="Start writing..."></textarea>

        <div class="footnotes-section">
          <label class="section-label">Footnotes / Links</label>
          <div class="footnote-row">
            <input type="text" id="footnoteInput" class="footnote-input" placeholder="Add a link... (URL or Label | URL)" autocomplete="off" />
            <button class="btn small" id="addFootnoteBtn" type="button">Add</button>
          </div>
          <div class="footnotes-display" id="footnotesDisplay"></div>
        </div>

        <div class="metadata-panel">
          <label class="section-label">Wikidata Tags</label>
          <div class="tags-display" id="tagsDisplay"></div>
          <div class="tag-input-wrapper">
            <input type="text" id="tagInput" class="tag-input-field" placeholder="Search Wikidata..." autocomplete="off" />
            <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
          </div>
        </div>
      </div>

      <div class="footer">
        <span>LOCAL • </span>
        <span class="status" id="status">Ready</span>
      </div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'juraNotes_v5';
    const WIKIDATA_API = 'https://www.wikidata.org/w/api.php';

    const els = {
      drawer: document.getElementById('drawer'),
      scrim: document.getElementById('scrim'),
      drawerToggle: document.getElementById('drawerToggle'),
      notesList: document.getElementById('notesList'),
      search: document.getElementById('search'),
      title: document.getElementById('title'),
      content: document.getElementById('content'),
      status: document.getElementById('status'),
      noteCount: document.getElementById('noteCount'),
      newNoteBtn: document.getElementById('newNoteBtn'),
      newNoteBtnTop: document.getElementById('newNoteBtnTop'),
      exportJsonBtn: document.getElementById('exportJsonBtn'),
      exportJsonBtnTop: document.getElementById('exportJsonBtnTop'),
      pinBtn: document.getElementById('pinBtn'),
      deleteBtn: document.getElementById('deleteBtn'),
      tagsDisplay: document.getElementById('tagsDisplay'),
      tagInput: document.getElementById('tagInput'),
      autocompleteDropdown: document.getElementById('autocompleteDropdown'),
      footnoteInput: document.getElementById('footnoteInput'),
      addFootnoteBtn: document.getElementById('addFootnoteBtn'),
      footnotesDisplay: document.getElementById('footnotesDisplay'),
      headingBtn: document.getElementById('headingBtn'),
      subheadingBtn: document.getElementById('subheadingBtn'),
      boldBtn: document.getElementById('boldBtn'),
      italicBtn: document.getElementById('italicBtn'),
      codeBtn: document.getElementById('codeBtn'),
      linkBtn: document.getElementById('linkBtn')
    };

    let notes = [];
    let currentNoteId = null;
    let searchTerm = '';
    let saveTimer = null;
    let statusTimer = null;
    let autocompleteTimer = null;

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function now() {
      return Date.now();
    }

    function safeUrl(raw) {
      try {
        const u = new URL(raw);
        return u.toString();
      } catch {
        return null;
      }
    }

    function parseFootnoteEntry(raw) {
      const input = (raw || '').trim();
      if (!input) return null;

      let label = '';
      let url = '';

      if (input.includes('|')) {
        const parts = input.split('|');
        label = parts[0].trim();
        url = parts.slice(1).join('|').trim();
      } else {
        url = input;
      }

      const normalized = safeUrl(url);
      if (!normalized) return null;

      if (!label) {
        try {
          const parsed = new URL(normalized);
          label = parsed.hostname.replace(/^www\./, '') || normalized;
        } catch {
          label = normalized;
        }
      }

      return {
        id: uid(),
        label,
        url: normalized
      };
    }

    function normalizeFootnotes(value) {
      if (!value) return [];
      if (Array.isArray(value)) {
        return value
          .map(item => {
            if (!item) return null;
            if (typeof item === 'string') {
              return parseFootnoteEntry(item);
            }
            if (typeof item === 'object') {
              const url = safeUrl(item.url || item.href || item.link || '');
              if (!url) return null;
              return {
                id: item.id || uid(),
                label: (item.label || item.title || '').trim() || new URL(url).hostname.replace(/^www\./, ''),
                url
              };
            }
            return null;
          })
          .filter(Boolean);
      }

      if (typeof value === 'string') {
        return value
          .split(/\n+/)
          .map(line => parseFootnoteEntry(line))
          .filter(Boolean);
      }

      return [];
    }

    function normalizeNote(note) {
      const n = note && typeof note === 'object' ? note : {};
      const normalized = {
        id: typeof n.id === 'string' ? n.id : uid(),
        title: typeof n.title === 'string' ? n.title : '',
        content: typeof n.content === 'string' ? n.content : '',
        pinned: !!n.pinned,
        updated: typeof n.updated === 'number' ? n.updated : now(),
        tags: Array.isArray(n.tags) ? n.tags.filter(Boolean) : [],
        footnotes: normalizeFootnotes(n.footnotes || n.links || n.linkEntries)
      };

      return normalized;
    }

    function loadNotes() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!Array.isArray(raw) || !raw.length) return [];
        return raw.map(normalizeNote);
      } catch {
        return [];
      }
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function setStatus(text, duration = 1100) {
      els.status.textContent = text;
      clearTimeout(statusTimer);
      if (duration > 0) {
        statusTimer = setTimeout(() => {
          if (els.status.textContent === text) {
            els.status.textContent = 'Ready';
          }
        }, duration);
      }
    }

    function currentNote() {
      return notes.find(n => n.id === currentNoteId) || null;
    }

    function setDrawerOpen(open) {
      els.drawer.classList.toggle('open', open);
      els.scrim.classList.toggle('show', open);
    }

    function getVisibleNotes() {
      const term = searchTerm.trim().toLowerCase();
      if (!term) return notes;
      return notes.filter(n =>
        (n.title || '').toLowerCase().includes(term) ||
        (n.content || '').toLowerCase().includes(term) ||
        (n.footnotes || []).some(f => (f.label || '').toLowerCase().includes(term) || (f.url || '').toLowerCase().includes(term))
      );
    }

    function renderTags() {
      const note = currentNote();
      els.tagsDisplay.innerHTML = '';
      if (!note || !note.tags || !note.tags.length) return;

      note.tags.forEach(tag => {
        const tagEl = document.createElement('div');
        tagEl.className = 'tag';

        const label = document.createElement('span');
        label.className = 'tag-label';
        label.textContent = tag.label || 'Unknown';

        const qid = document.createElement('span');
        qid.className = 'tag-qid';
        qid.textContent = tag.qid || '';

        const remove = document.createElement('span');
        remove.className = 'tag-remove';
        remove.textContent = '×';
        remove.addEventListener('click', () => removeTag(tag.qid));

        tagEl.appendChild(label);
        tagEl.appendChild(qid);
        tagEl.appendChild(remove);

        els.tagsDisplay.appendChild(tagEl);
      });
    }

    function renderFootnotes() {
      const note = currentNote();
      els.footnotesDisplay.innerHTML = '';

      if (!note || !Array.isArray(note.footnotes) || !note.footnotes.length) return;

      note.footnotes.forEach(entry => {
        const row = document.createElement('div');
        row.className = 'footnote-item';

        const left = document.createElement('div');
        left.style.minWidth = '0';

        const link = document.createElement('a');
        link.className = 'footnote-link';
        link.href = entry.url;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = entry.label || entry.url;

        const meta = document.createElement('div');
        meta.className = 'footnote-meta';
        meta.textContent = entry.url;

        left.appendChild(link);
        left.appendChild(meta);

        const remove = document.createElement('button');
        remove.className = 'footnote-remove';
        remove.type = 'button';
        remove.textContent = '×';
        remove.addEventListener('click', () => removeFootnote(entry.id));

        row.appendChild(left);
        row.appendChild(remove);
        els.footnotesDisplay.appendChild(row);
      });
    }

    function renderNotesList() {
      els.notesList.innerHTML = '';

      const visible = getVisibleNotes().sort((a, b) => {
        if (a.pinned !== b.pinned) return b.pinned - a.pinned;
        return b.updated - a.updated;
      });

      els.noteCount.textContent = notes.length.toString();

      if (!visible.length) {
        const empty = document.createElement('div');
        empty.style.cssText = 'border: 1px dashed var(--line); background: rgba(255,255,255,0.2); padding: 8px; font-size: 0.8rem; color: var(--muted); font-family: Jura, sans-serif;';
        empty.textContent = searchTerm ? 'No matches' : 'No notes yet';
        els.notesList.appendChild(empty);
        return;
      }

      visible.forEach(note => {
        const item = document.createElement('div');
        item.className = 'note-item' + (note.id === currentNoteId ? ' active' : '');

        const title = document.createElement('div');
        title.className = 'note-item-title';
        title.textContent = note.title || 'Untitled';

        const preview = document.createElement('p');
        preview.className = 'note-item-preview';
        const previewText = (note.content || '').trim().replace(/\s+/g, ' ').slice(0, 70);
        preview.textContent = previewText || 'No content';

        const pinBtn = document.createElement('button');
        pinBtn.className = 'note-item-btn pin-btn';
        pinBtn.type = 'button';
        pinBtn.textContent = note.pinned ? '⟡' : '⌂';
        pinBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          togglePin(note.id);
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'note-item-btn delete-btn';
        deleteBtn.type = 'button';
        deleteBtn.textContent = '×';
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteNote(note.id);
        });

        item.appendChild(title);
        item.appendChild(preview);
        item.appendChild(pinBtn);
        item.appendChild(deleteBtn);

        item.addEventListener('click', () => loadNote(note.id));
        els.notesList.appendChild(item);
      });
    }

    function createNote() {
      return normalizeNote({
        id: uid(),
        title: '',
        content: '',
        pinned: false,
        updated: now(),
        tags: [],
        footnotes: []
      });
    }

    function saveCurrentEditorState() {
      const note = currentNote();
      if (!note) return false;

      note.title = els.title.value;
      note.content = els.content.value;
      note.updated = now();
      return true;
    }

    function commitEditor() {
      clearTimeout(saveTimer);
      saveCurrentEditorState();
      saveToStorage();
    }

    function loadEditor(note) {
      if (!note) return;
      currentNoteId = note.id;
      els.title.value = note.title || '';
      els.content.value = note.content || '';
      els.tagInput.value = '';
      els.footnoteInput.value = '';
      els.autocompleteDropdown.classList.remove('show');
      renderTags();
      renderFootnotes();
      renderNotesList();
      setStatus('Ready', 0);
    }

    function newNote() {
      commitEditor();
      const note = createNote();
      notes.unshift(note);
      loadEditor(note);
      saveToStorage();
      renderNotesList();
      setStatus('New note');
      if (window.innerWidth <= 920) setDrawerOpen(false);
    }

    function loadNote(id) {
      commitEditor();
      const note = notes.find(n => n.id === id);
      if (!note) return;
      loadEditor(note);
      if (window.innerWidth <= 920) setDrawerOpen(false);
    }

    function togglePin(id = currentNoteId) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      note.pinned = !note.pinned;
      note.updated = now();
      saveToStorage();
      renderNotesList();
      setStatus(note.pinned ? 'Pinned' : 'Unpinned');
    }

    function deleteNote(id) {
      const note = notes.find(n => n.id === id);
      if (!note) return;

      if (!confirm(`Delete "${note.title || 'Untitled'}"?`)) return;

      const wasCurrent = currentNoteId === id;
      notes = notes.filter(n => n.id !== id);
      if (wasCurrent) currentNoteId = null;

      saveToStorage();

      if (notes.length > 0) {
        loadEditor(notes[0]);
      } else {
        const blank = createNote();
        notes = [blank];
        saveToStorage();
        loadEditor(blank);
      }

      renderNotesList();
      setStatus('Deleted');
    }

    function exportJson() {
      commitEditor();
      const dataStr = JSON.stringify(notes, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `jura-paper-${new Date().toISOString().split('T')[0]}.json`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatus('JSON exported');
    }

    function addFootnoteFromInput() {
      const note = currentNote();
      if (!note) return;

      const parsed = parseFootnoteEntry(els.footnoteInput.value);
      if (!parsed) {
        setStatus('Invalid link');
        return;
      }

      note.footnotes = Array.isArray(note.footnotes) ? note.footnotes : [];

      if (note.footnotes.some(entry => entry.url === parsed.url)) {
        setStatus('Link already added');
        els.footnoteInput.value = '';
        return;
      }

      note.footnotes.push(parsed);
      note.updated = now();
      els.footnoteInput.value = '';
      saveToStorage();
      renderFootnotes();
      renderNotesList();
      setStatus('Link added');
    }

    function removeFootnote(id) {
      const note = currentNote();
      if (!note || !Array.isArray(note.footnotes)) return;
      note.footnotes = note.footnotes.filter(entry => entry.id !== id);
      note.updated = now();
      saveToStorage();
      renderFootnotes();
      renderNotesList();
      setStatus('Link removed');
    }

    function addTag(tagEntity) {
      const note = currentNote();
      if (!note) return;

      if (!Array.isArray(note.tags)) note.tags = [];

      if (note.tags.some(t => t.qid === tagEntity.qid)) {
        setStatus('Tag already added');
        return;
      }

      note.tags.push(tagEntity);
      note.updated = now();
      els.tagInput.value = '';
      els.autocompleteDropdown.classList.remove('show');
      saveToStorage();
      renderTags();
      renderNotesList();
      setStatus('Tag added');
    }

    function removeTag(qid) {
      const note = currentNote();
      if (!note || !Array.isArray(note.tags)) return;
      note.tags = note.tags.filter(t => t.qid !== qid);
      note.updated = now();
      saveToStorage();
      renderTags();
      renderNotesList();
      setStatus('Tag removed');
    }

    async function searchWikidata(query) {
      const term = (query || '').trim();
      if (term.length < 2) {
        els.autocompleteDropdown.classList.remove('show');
        return;
      }

      try {
        const response = await fetch(`${WIKIDATA_API}?action=wbsearchentities&search=${encodeURIComponent(term)}&language=en&format=json&origin=*`);
        const data = await response.json();
        renderAutocomplete(Array.isArray(data.search) ? data.search : []);
      } catch (err) {
        console.error('Wikidata search failed:', err);
        setStatus('Search error');
      }
    }

    function renderAutocomplete(results) {
      els.autocompleteDropdown.innerHTML = '';

      if (!results.length) {
        els.autocompleteDropdown.classList.remove('show');
        return;
      }

      results.slice(0, 8).forEach(item => {
        const div = document.createElement('div');
        div.className = 'autocomplete-item';

        const label = document.createElement('span');
        label.className = 'autocomplete-label';
        label.textContent = item.label || 'Unknown';

        const desc = document.createElement('div');
        desc.className = 'autocomplete-desc';
        desc.textContent = item.description || 'No description';

        const qid = document.createElement('div');
        qid.className = 'autocomplete-qid';
        qid.textContent = item.id || '';

        div.appendChild(label);
        div.appendChild(desc);
        div.appendChild(qid);

        div.addEventListener('click', () => {
          addTag({
            qid: item.id,
            label: item.label || item.id,
            description: item.description || ''
          });
        });

        els.autocompleteDropdown.appendChild(div);
      });

      const inputRect = els.tagInput.getBoundingClientRect();
      els.autocompleteDropdown.style.left = inputRect.left + 'px';
      els.autocompleteDropdown.style.top = (inputRect.top - 200) + 'px';
      els.autocompleteDropdown.style.width = inputRect.width + 'px';
      els.autocompleteDropdown.classList.add('show');
    }

    function insertText(before, after = '') {
      const textarea = els.content;
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const selected = textarea.value.substring(start, end);

      textarea.value =
        textarea.value.substring(0, start) +
        before + selected + after +
        textarea.value.substring(end);

      textarea.focus();
      textarea.selectionStart = start + before.length;
      textarea.selectionEnd = start + before.length + selected.length;

      saveCurrentEditorState();
      saveToStorage();
      renderNotesList();
    }

    function bind() {
      els.drawerToggle.addEventListener('click', () => {
        setDrawerOpen(!els.drawer.classList.contains('open'));
      });

      els.scrim.addEventListener('click', () => setDrawerOpen(false));

      els.newNoteBtn.addEventListener('click', newNote);
      els.newNoteBtnTop.addEventListener('click', newNote);

      els.exportJsonBtn.addEventListener('click', exportJson);
      els.exportJsonBtnTop.addEventListener('click', exportJson);

      els.pinBtn.addEventListener('click', () => togglePin());
      els.deleteBtn.addEventListener('click', () => {
        if (currentNoteId) deleteNote(currentNoteId);
      });

      els.addFootnoteBtn.addEventListener('click', addFootnoteFromInput);
      els.footnoteInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addFootnoteFromInput();
        }
      });

      els.search.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderNotesList();
      });

      els.title.addEventListener('input', () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveCurrentEditorState();
          saveToStorage();
          renderNotesList();
        }, 180);
      });

      els.content.addEventListener('input', () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveCurrentEditorState();
          saveToStorage();
          renderNotesList();
        }, 180);
      });

      els.tagInput.addEventListener('input', (e) => {
        clearTimeout(autocompleteTimer);
        autocompleteTimer = setTimeout(() => searchWikidata(e.target.value), 260);
      });

      document.addEventListener('click', (e) => {
        if (!els.tagInput.contains(e.target) && !els.autocompleteDropdown.contains(e.target)) {
          els.autocompleteDropdown.classList.remove('show');
        }
      });

      document.addEventListener('keydown', (e) => {
        const mod = e.ctrlKey || e.metaKey;
        if (!mod) return;

        switch (e.key.toLowerCase()) {
          case 'n':
            e.preventDefault();
            newNote();
            break;
          case 'p':
            e.preventDefault();
            togglePin();
            break;
          case 'k':
            e.preventDefault();
            els.search.focus();
            break;
        }
      });

      els.headingBtn.addEventListener('click', () => insertText('# ', '\n'));
      els.subheadingBtn.addEventListener('click', () => insertText('## ', '\n'));
      els.boldBtn.addEventListener('click', () => insertText('**', '**'));
      els.italicBtn.addEventListener('click', () => insertText('*', '*'));
      els.codeBtn.addEventListener('click', () => insertText('`', '`'));
      els.linkBtn.addEventListener('click', () => insertText('[text](', ')'));

      window.addEventListener('beforeunload', () => {
        commitEditor();
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth > 920) {
          els.scrim.classList.remove('show');
        }
      });
    }

    function init() {
      notes = loadNotes();
      if (!notes.length) {
        notes = [createNote()];
        saveToStorage();
      }
      currentNoteId = notes[0].id;
      loadEditor(notes[0]);
      renderNotesList();
      bind();
      setDrawerOpen(false);
    }

    init();
  </script>
</body>
</html>
